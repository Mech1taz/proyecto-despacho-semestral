name: Despliegue automatico a AWS ECR

on:
  push:
    branches: [ "main" ] # Se activa automáticamente al hacer push a main

jobs:
  build-and-push:
    name: Compilar y subir imagenes a AWS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codigo local
      uses: actions/checkout@v3

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Iniciar sesion en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Construir y Subir Imagenes a Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # 1. Construir y subir el Backend de Ventas (Tag: ventas)
        # Bajamos hasta la subcarpeta interna donde esta el pom.xml y el Dockerfile
        docker build -t $REGISTRY/ecr_repo_url_backend:ventas ./back-Ventas_SpringBoot/Springboot-API-REST
        docker push $REGISTRY/ecr_repo_url_backend:ventas

        # 2. Construir y subir el Backend de Despachos (Tag: despachos)
        # Bajamos hasta la subcarpeta interna correspondiente
        docker build -t $REGISTRY/ecr_repo_url_backend:despachos ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push $REGISTRY/ecr_repo_url_backend:despachos

        # 3. Construir y subir el Frontend (Tag: latest)
        docker build -t $REGISTRY/ecr_repo_url_frontend:latest ./front_despacho
        docker push $REGISTRY/ecr_repo_url_frontend:latest