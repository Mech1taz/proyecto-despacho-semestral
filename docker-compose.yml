version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: proyecto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: proyecto
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  ventas-back:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: ventas-back
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      DB_NAME: ventas_db
    depends_on:
      - mysql

  despacho-back:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: despacho-back
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      DB_NAME: despacho_db
    depends_on:
      - mysql

  front:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: front-despacho
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ventas-back
      - despacho-back

volumes:
  mysql-data:
    driver: local
